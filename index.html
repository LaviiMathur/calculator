<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="body">
        <div id="screen" class="screen">Enter your digit</div>

        <div id="ce" class="btn">CE</div>
        <div id="del" class="btn">DEL</div>
        <div id="n%" class="btn">%</div>
        <div id="n/" class="btn">/</div>
        <div id="n7" class="btn">7</div>
        <div id="n8" class="btn">8</div>
        <div id="n9" class="btn">9</div>
        <div id="n*" class="btn">*</div>
        <div id="n4" class="btn">4</div>
        <div id="n5" class="btn">5</div>
        <div id="n6" class="btn">6</div>
        <div id="n-" class="btn">-</div>
        <div id="n1" class="btn">1</div>
        <div id="n2" class="btn">2</div>
        <div id="n3" class="btn">3</div>
        <div id="n+" class="btn">+</div>
        <div id="n00" class="btn">00</div>
        <div id="n0" class="btn">0</div>
        <div id="n." class="btn">.</div>
        <div id="n=" class="btn equal">=</div>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
